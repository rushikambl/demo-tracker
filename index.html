<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Equal</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #F5F7FA;
  --card: #FFFFFF;
  --navy: #0B1E3D;
  --navy2: #16305A;
  --blue: #1A56DB;
  --muted: #94A3B8;
  --line: #E2E8F0;
  --ink: #0F172A;
  --green: #10B981;
  --orange: #F59E0B;
  --red: #EF4444;
  --purple: #8B5CF6;
  --teal: #06B6D4;
}

body {
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
}

/* ══ HEADER CARD ══ */
.hdr {
  margin: 0;
  padding: 52px 20px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--line);
}
.hdr-top { display:flex; justify-content:space-between; align-items:flex-start; }

/* name card */
.hdr-left {}
.brand-sm {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--blue); margin-bottom: 2px;
}
.brand-lg {
  font-size: 38px; font-weight: 800; color: var(--navy);
  letter-spacing: -1.5px; line-height: 1;
}
.greeting {
  font-size: 14px; color: var(--muted); margin-top: 5px; font-weight: 400;
}
.greeting strong { color: var(--navy); font-weight: 700; }

.hdr-btns { display:flex; gap:8px; padding-top:6px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer; transition: all 0.15s; flex-shrink:0;
}
.icon-btn.primary { background: var(--navy); color: #fff; box-shadow: 0 4px 14px rgba(11,30,61,0.25); }
.icon-btn.secondary { background: var(--bg); color: var(--navy); }
.icon-btn:active { opacity: 0.7; transform: scale(0.95); }
.icon-btn.spinning svg { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* fb status */
.fb-status {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted); margin-top: 10px;
  background: var(--bg); padding: 4px 10px; border-radius: 20px;
  width: fit-content;
}
.fb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line); flex-shrink:0; }
.fb-dot.live { background: var(--green); }
.fb-dot.error { background: var(--red); }

/* ══ TABS ══ */
.tabs {
  display: flex; overflow-x: auto; scrollbar-width: none;
  background: var(--card); border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 50; padding: 0 12px;
  gap: 4px;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 12px 14px; font-size: 13px; font-weight: 600;
  color: var(--muted); cursor: pointer; border-bottom: 2.5px solid transparent;
  transition: all 0.18s; background: none; border-top: none;
  border-left: none; border-right: none;
  font-family: inherit; white-space: nowrap;
}
.tab.active { color: var(--navy); border-bottom-color: var(--navy); }

/* ══ BODY ══ */
.body { padding: 0 16px 110px; }

/* ══ SUMMARY ══ */
.summary { margin: 16px 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sum-card {
  border-radius: 20px; padding: 20px 18px; position: relative; overflow: hidden;
}
.sum-card.plain {
  background: var(--card); box-shadow: 0 1px 8px rgba(15,23,42,0.06);
}
.sum-card.hi {
  background: var(--navy);
  box-shadow: 0 8px 28px rgba(11,30,61,0.3);
}
/* grid pattern on hi card */
.sum-card.hi::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 20px 20px;
}
/* glowing dot top right */
.sum-card.hi::after {
  content: '';
  position: absolute; top: -24px; right: -24px;
  width: 90px; height: 90px; border-radius: 50%;
  background: radial-gradient(circle, rgba(26,86,219,0.7), transparent 70%);
}
.sum-num {
  font-size: 48px; font-weight: 800; line-height: 1;
  margin-bottom: 5px; letter-spacing: -2px; position: relative; z-index: 1;
}
.sum-card.plain .sum-num { color: var(--navy); }
.sum-card.hi .sum-num { color: #fff; }
.sum-label {
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; position: relative; z-index: 1;
}
.sum-card.plain .sum-label { color: var(--muted); }
.sum-card.hi .sum-label { color: rgba(255,255,255,0.5); }

/* ══ SEC LABEL ══ */
.sec-label {
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 10px; padding-left: 2px;
}

/* ══ LEAD LIST ══ */
.lead-list {
  display: flex; flex-direction: column;
  background: var(--card); border-radius: 18px; overflow: hidden;
  box-shadow: 0 1px 8px rgba(15,23,42,0.06);
}
.lead-row {
  padding: 14px 16px; display: flex; align-items: center; gap: 13px;
  cursor: pointer; transition: background 0.1s; position: relative;
}
.lead-row:not(:last-child)::after {
  content: ''; position: absolute; bottom: 0; left: 58px; right: 0;
  height: 1px; background: var(--line);
}
.lead-row:active { background: var(--bg); }

/* icon bubble */
.lead-icon {
  width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.lead-icon.call    { background: #EFF6FF; }
.lead-icon.demo    { background: #FFFBEB; }
.lead-icon.given   { background: #ECFDF5; }
.lead-icon.changes { background: #FEF2F2; }
.lead-icon.redemo  { background: #ECFEFF; }
.lead-icon.rejected{ background: #FDF2F8; }
.lead-icon.cheque  { background: #ECFDF5; }
.lead-icon.cash    { background: #FFFBEB; }

.lead-info { flex: 1; min-width: 0; }
.lead-name {
  font-size: 15px; font-weight: 600; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lead-sub {
  font-size: 12px; color: var(--muted); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lead-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.lead-tag {
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; white-space: nowrap; letter-spacing: 0.2px;
}
.lead-tag.call     { background: #DBEAFE; color: #1E40AF; }
.lead-tag.demo     { background: #FEF3C7; color: #92400E; }
.lead-tag.cheque   { background: #D1FAE5; color: #065F46; }
.lead-tag.cash     { background: #FEF3C7; color: #92400E; }
.lead-tag.rejected { background: #FCE7F3; color: #9D174D; }
.lead-tag.given    { background: #D1FAE5; color: #065F46; }
.lead-tag.changes  { background: #FEE2E2; color: #991B1B; }
.lead-tag.redemo   { background: #CFFAFE; color: #164E63; }
.lead-date { font-size: 11px; color: var(--muted); }

/* ══ MAINT ALERT ══ */
.maint-alert {
  background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 16px;
  padding: 14px 16px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 12px;
}
.maint-alert-icon { font-size: 22px; flex-shrink: 0; }
.maint-alert-text strong { color: #92400E; display: block; font-size: 14px; font-weight: 700; }
.maint-alert-text span { color: #B45309; font-size: 12px; }

/* ══ CHIPS ══ */
.chip-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 12px; }
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 7px 16px; border-radius: 22px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: var(--card); color: var(--muted); border: none;
  transition: all 0.15s; font-family: inherit;
  box-shadow: 0 1px 4px rgba(15,23,42,0.08);
}
.chip.active { background: var(--navy); color: #fff; box-shadow: 0 4px 12px rgba(11,30,61,0.25); }

/* ══ SEARCH ══ */
.search-wrap { position: relative; margin: 12px 0 14px; }
.search-wrap svg {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%); color: var(--muted); pointer-events: none;
}
.search-input {
  width: 100%; padding: 13px 36px 13px 42px;
  background: var(--card); border: 1px solid var(--line); border-radius: 14px;
  color: var(--ink); font-size: 15px; font-family: inherit; outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--navy); }
.search-input::placeholder { color: var(--muted); }
.search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: var(--muted); border: none; color: #fff; font-size: 11px;
  cursor: pointer; display: none; width: 18px; height: 18px;
  border-radius: 50%; line-height: 18px; text-align: center; padding: 0;
}

/* ══ EMPTY ══ */
.empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 15px; }

/* ══ OVERLAY ══ */
.overlay {
  position: fixed; inset: 0; background: rgba(11,30,61,0.45); z-index: 200;
  display: flex; align-items: flex-end; opacity: 0; pointer-events: none;
  transition: opacity 0.2s; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  background: var(--card); border-radius: 24px 24px 0 0;
  padding: 0 20px calc(36px + env(safe-area-inset-bottom,0px));
  width: 100%; max-height: 92vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.32,.72,0,1);
}
.overlay.open .sheet { transform: translateY(0); }
.handle { width: 36px; height: 4px; background: var(--line); border-radius: 4px; margin: 12px auto 20px; }
.sheet-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; color: var(--navy); letter-spacing: -0.5px; }

/* ══ FIELDS ══ */
.field { margin-bottom: 14px; }
.field label {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px; display: block; margin-bottom: 7px;
}
.field input, .field select {
  width: 100%; padding: 13px 14px; background: var(--bg);
  border: 1px solid var(--line); border-radius: 12px; color: var(--ink);
  font-size: 15px; font-family: inherit; outline: none;
  -webkit-appearance: none; appearance: none; transition: border-color 0.15s;
}
.field input:focus, .field select:focus { border-color: var(--navy); background: #fff; }
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ══ BUTTONS ══ */
.btn-primary {
  width: 100%; padding: 15px; background: var(--navy); color: #fff;
  border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-bottom: 10px;
  box-shadow: 0 4px 16px rgba(11,30,61,0.2); transition: opacity 0.1s;
}
.btn-primary:active { opacity: 0.8; }
.btn-ghost {
  width: 100%; padding: 14px; background: var(--bg); color: var(--ink);
  border: none; border-radius: 14px; font-size: 16px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: opacity 0.1s; margin-bottom:0;
}
.btn-ghost:active { opacity: 0.7; }
.btn-danger {
  width: 100%; padding: 14px; background: #FEF2F2; color: var(--red);
  border: none; border-radius: 14px; font-size: 16px; font-weight: 600;
  cursor: pointer; font-family: inherit; margin-bottom: 10px;
}

/* ══ DETAIL ══ */
.detail-name { font-size: 28px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; margin-bottom: 3px; }
.detail-co { font-size: 15px; color: var(--muted); margin-bottom: 20px; }
.detail-section { background: var(--bg); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
.detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 15px; position: relative; font-size: 15px;
}
.detail-row:not(:last-child)::after {
  content: ''; position: absolute; bottom: 0; left: 15px; right: 0;
  height: 1px; background: var(--line);
}
.detail-row span:first-child { color: var(--muted); font-size: 14px; }
.detail-row span:last-child { font-weight: 600; color: var(--ink); max-width: 58%; text-align: right; font-size:14px; }
.d-actions { margin-top: 16px; display: flex; flex-direction: column; }

/* ══ REJECT BOX ══ */
.reject-box { background: #FEF2F2; border-radius: 14px; padding: 16px; margin-bottom: 10px; display: none; }
.reject-box-title { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
.rrow { display: flex; gap: 8px; }
.rrow button { flex: 1; margin-bottom: 0; }

/* ══ TOAST ══ */
.toast {
  position: fixed; top: 56px; left: 50%;
  transform: translateX(-50%) translateY(-90px);
  background: var(--navy); color: #fff;
  padding: 11px 22px; border-radius: 22px;
  font-size: 14px; font-weight: 600; z-index: 999;
  transition: transform 0.3s cubic-bezier(.32,.72,0,1); white-space: nowrap;
  box-shadow: 0 8px 24px rgba(11,30,61,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }

.panel { display: none; }
.panel.active { display: block; }
</style>
</head>
<body>



<!-- ══ MAIN APP ══ -->
<div id="app">

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="brand-sm">DemoTrack</div>
      <div class="brand-lg">Equal</div>
      <div class="greeting" id="greeting"></div>
    </div>
    <div class="hdr-btns">
      <button class="icon-btn secondary" id="refreshBtn" onclick="refreshData()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button class="icon-btn primary" onclick="openAdd()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div class="fb-status"><div class="fb-dot" id="fb-dot"></div><span id="fb-label">Connecting...</span></div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" onclick="go('today')">Today</button>
  <button class="tab" onclick="go('leads')">All Leads</button>
  <button class="tab" onclick="go('rejected')">Rejected</button>
  <button class="tab" onclick="go('maint')">Maintenance</button>
</div>

<div class="body">

  <!-- TODAY -->
  <div id="p-today" class="panel active">
    <div class="summary">
      <div class="sum-card hi">
        <div class="sum-num" id="s-demos">0</div>
        <div class="sum-label">Demos Today</div>
      </div>
      <div class="sum-card plain">
        <div class="sum-num" id="s-calls">0</div>
        <div class="sum-label">To Call</div>
      </div>
    </div>
    <div id="maint-alerts"></div>
    <div class="sec-label">Demos Scheduled</div>
    <div class="lead-list" id="today-list"></div>
  </div>

  <!-- ALL LEADS -->
  <div id="p-leads" class="panel">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search-input" type="text" placeholder="Search name, company, software..." oninput="onSearch(this.value)">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
    </div>
    <div class="chip-row" id="date-chips"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <button class="chip active" onclick="setStFilter('all',this)">All</button>
      <button class="chip" onclick="setStFilter('call',this)">To Call</button>
      <button class="chip" onclick="setStFilter('demo',this)">Demo Scheduled</button>
      <button class="chip" onclick="setStFilter('given',this)">Demo Given</button>
      <button class="chip" onclick="setStFilter('changes',this)">Changes</button>
      <button class="chip" onclick="setStFilter('redemo',this)">Re-Demo</button>
    </div>
    <div class="lead-list" id="leads-list"></div>
  </div>

  <!-- REJECTED -->
  <div id="p-rejected" class="panel">
    <div style="height:18px;"></div>
    <div class="sec-label">Rejected Leads</div>
    <div class="lead-list" id="rejected-list"></div>
  </div>

  <!-- MAINTENANCE (closed cash only) -->
  <div id="p-maint" class="panel">
    <div style="height:18px;"></div>
    <div class="sec-label">Cash clients — 1 year cycle</div>
    <div class="lead-list" id="maint-list"></div>
  </div>

</div>
</div><!-- end #app -->

<!-- ADD LEAD -->
<div class="overlay" id="addOv">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">New Lead</div>
    <div class="field"><label>Name</label><input id="f-name" type="text" placeholder="Ramesh Patel"></div>
    <div class="field"><label>Company</label><input id="f-co" type="text" placeholder="Patel Traders"></div>
    <div class="field"><label>Phone</label><input id="f-ph" type="tel" placeholder="98765 43210"></div>
    <div class="field"><label>Software</label><input id="f-sw" type="text" placeholder="e.g. Loom, Acc Dyeing, Billing..."></div>
    <div class="field"><label>Reference Person</label><input id="f-ref" type="text" placeholder="Who referred this lead?"></div>
    <div class="field"><label>Status</label>
      <select id="f-st" onchange="handleAdd()">
        <option value="call">To Call</option>
        <option value="demo">Demo Scheduled</option>
        <option value="given">Demo Given</option>
        <option value="changes">Changes Requested</option>
        <option value="redemo">Re-Demo Scheduled</option>
        <option value="closed">Closed</option>
      </select>
    </div>
    <div id="f-demo-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Demo Date</label><input id="f-dd" type="date"></div>
        <div class="field"><label>Demo Type</label>
          <select id="f-dtype"><option value="offline">Offline</option><option value="online">Online</option></select>
        </div>
      </div>
    </div>
    <div id="f-pay-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Payment</label>
          <select id="f-pay"><option value="cheque">Cheque</option><option value="cash">Cash</option></select>
        </div>
        <div class="field"><label>Amount ₹</label><input id="f-amt" type="number" placeholder="25000"></div>
      </div>
      <div class="field"><label>Closing Date</label><input id="f-cd" type="date"></div>
    </div>
    <div class="field"><label>Notes</label><input id="f-notes" type="text" placeholder="Optional..."></div>
    <button class="btn-primary" onclick="saveLead()">Save Lead</button>
    <button class="btn-ghost" onclick="closeAdd()">Cancel</button>
  </div>
</div>

<!-- LEAD DETAIL -->
<div class="overlay" id="detOv">
  <div class="sheet">
    <div class="handle"></div>
    <div class="detail-name" id="d-name"></div>
    <div class="detail-co" id="d-co"></div>
    <div id="d-rows"></div>
    <div class="d-actions">
      <div id="d-action-btns"></div>
      <div class="reject-box" id="d-reject-box">
        <div class="reject-box-title">Why did they reject?</div>
        <div class="field">
          <label>Reason</label>
          <select id="r-reason">
            <option>Too expensive</option>
            <option>Not interested</option>
            <option>Using competitor software</option>
            <option>No budget right now</option>
            <option>Need more time</option>
            <option>Feature not available</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:14px;">
          <label>Extra Notes (optional)</label>
          <input type="text" id="r-notes" placeholder="Any additional info...">
        </div>
        <div class="rrow">
          <button class="btn-ghost" onclick="document.getElementById('d-reject-box').style.display='none'">Cancel</button>
          <button class="btn-primary" style="margin:0;background:var(--red);" onclick="confirmReject()">Confirm</button>
        </div>
      </div>
      <div id="d-reject-btn-wrap"></div>
    </div>
  </div>
</div>

<!-- UPDATE STATUS -->
<div class="overlay" id="updOv">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="u-title"></div>
    <input type="hidden" id="u-id">
    <div class="field"><label>Status</label>
      <select id="u-st" onchange="handleUpd()">
        <option value="call">To Call</option>
        <option value="demo">Demo Scheduled</option>
        <option value="given">Demo Given</option>
        <option value="changes">Changes Requested</option>
        <option value="redemo">Re-Demo Scheduled</option>
        <option value="closed">Closed</option>
      </select>
    </div>
    <div id="u-dd-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Demo Date</label><input id="u-dd" type="date"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── HELPERS ──
const td  = () => new Date().toISOString().split('T')[0];
const fmt = d => { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}); };
const fmtY= d => { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); };
const mDate=l => {
  if(!l.cd) return null;
  const d=new Date(l.cd+'T00:00:00');
  const day=d.getDate();
  // If closed after 15th → maintenance starts 1st of NEXT month + 1 year
  // If closed on or before 15th → maintenance starts 1st of SAME month + 1 year
  let startYear=d.getFullYear(), startMonth=d.getMonth();
  if(day>15) startMonth+=1; // move to next month
  const base=new Date(startYear, startMonth, 1); // 1st of that month
  base.setFullYear(base.getFullYear()+1); // + 1 year
  return base;
};
const dl  = l => { const m=mDate(l); if(!m) return null; return Math.ceil((m-new Date())/86400000); };
const fmtDate = d => d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});

const hr=new Date().getHours();
document.getElementById('greeting').innerHTML=(hr<12?'Good morning':hr<17?'Good afternoon':'Good evening')+', <strong style="color:var(--ink);font-weight:700;">Nilesh</strong> 👋';

let leads=[], db=null, rejectId=null, stFilter='all', dtFilter='all', searchQ='';

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyBYg9QnvpQg-NMWzvRjXrr_4V9X3dHZYmY",
  authDomain: "equal-softtech.firebaseapp.com",
  projectId: "equal-softtech",
  storageBucket: "equal-softtech.firebasestorage.app",
  messagingSenderId: "163914755343",
  appId: "1:163914755343:web:079b349e1365f9a41a627a"
};

// ── STATUS ──
function setFbStatus(state, label) {
  const dot=document.getElementById('fb-dot');
  const lbl=document.getElementById('fb-label');
  if(dot) dot.className='fb-dot'+(state==='live'?' live':state==='error'?' error':'');
  if(lbl) lbl.textContent=label;
}
_bridge.setFbStatus = setFbStatus;

// ── INIT FIREBASE ──
const firebaseApp = initializeApp(firebaseConfig);
db = getFirestore(firebaseApp);
setFbStatus('connecting','Connecting...');

onSnapshot(collection(db,'leads'), snap => {
  leads = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  setFbStatus('live','Live • '+leads.length+' leads');
  render();
}, err => {
  setFbStatus('error','Error: '+err.code);
  console.error('Firestore error:', err);
});

// ── TABS ──
_bridge.go = window.go = function(tab) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('p-'+tab).classList.add('active');
  const idx={today:0,leads:1,rejected:2,maint:3};
  document.querySelectorAll('.tab')[idx[tab]]?.classList.add('active');
  render();
};

// ── TAG ──
function tagFor(l) {
  if(l.st==='call')     return {cls:'call',     txt:'To Call'};
  if(l.st==='demo')     return {cls:'demo',     txt:'Demo'};
  if(l.st==='given')    return {cls:'given',    txt:'Demo Given'};
  if(l.st==='changes')  return {cls:'changes',  txt:'Changes'};
  if(l.st==='redemo')   return {cls:'redemo',   txt:'Re-Demo'};
  if(l.st==='rejected') return {cls:'rejected', txt:'Rejected'};
  return l.pay==='cheque'?{cls:'cheque',txt:'Cheque'}:{cls:'cash',txt:'Cash'};
}

// ── ROW HTML ──
const statusIcon={call:'📞',demo:'💻',given:'✅',changes:'⚙️',redemo:'🔄',rejected:'✗',cheque:'📋',cash:'💰'};
function rowHTML(l) {
  const t=tagFor(l);
  const parts=[l.co,l.sw,l.dd?(l.dd===td()?'Today':fmt(l.dd)):null].filter(Boolean);
  const typeLabel=l.dtype&&(l.st==='demo'||l.st==='redemo')?' · '+l.dtype.charAt(0).toUpperCase()+l.dtype.slice(1):'';
  const icon=statusIcon[l.st]||'•';
  return `<div class="lead-row" onclick="openDetail('${l.id}')">
    <div class="lead-icon ${t.cls}">${icon}</div>
    <div class="lead-info">
      <div class="lead-name">${l.name}</div>
      <div class="lead-sub">${parts.join(' · ')}</div>
    </div>
    <div class="lead-right">
      <div class="lead-tag ${t.cls}">${t.txt}${typeLabel}</div>
      <div class="lead-date">${l.ph?l.ph.slice(-4):''}</div>
    </div>
  </div>`;
}

// ── RENDER ──
function render() {
  const t=td();

  // Stats
  document.getElementById('s-demos').textContent=leads.filter(l=>l.dd===t&&l.st==='demo').length;
  document.getElementById('s-calls').textContent=leads.filter(l=>l.st==='call').length;

  // Maint alerts
  const due=leads.filter(l=>l.pay==='cash'&&l.cd).map(l=>({l,d:dl(l)})).filter(x=>x.d!=null&&x.d>=0&&x.d<=30);
  document.getElementById('maint-alerts').innerHTML=due.map(({l,d})=>
    `<div class="maint-alert"><div class="maint-alert-icon">⚠️</div><div class="maint-alert-text"><strong>${l.name}</strong><span>${l.co||''} · Maintenance ${d===0?'today':'in '+d+' days'}</span></div></div>`).join('');

  // Today demos
  const demos=leads.filter(l=>l.dd===t&&l.st==='demo');
  document.getElementById('today-list').innerHTML=demos.length?demos.map(rowHTML).join(''):`<div class="empty">No demos scheduled today</div>`;

  // All leads (call + demo only — NOT closed or rejected)
  const dates=[...new Set(leads.filter(l=>['call','demo','given','changes','redemo'].includes(l.st)).map(l=>l.dd).filter(Boolean))].sort().reverse();
  document.getElementById('date-chips').innerHTML=
    `<button class="chip ${dtFilter==='all'?'active':''}" onclick="setDtFilter('all')">All</button>`+
    dates.map(d=>`<button class="chip ${dtFilter===d?'active':''}" onclick="setDtFilter('${d}')">${d===t?'Today':fmt(d)}</button>`).join('');

  let active=leads.filter(l=>['call','demo','given','changes','redemo'].includes(l.st));
  if(dtFilter!=='all') active=active.filter(l=>l.dd===dtFilter);
  if(stFilter!=='all') active=active.filter(l=>l.st===stFilter);
  if(searchQ) {
    const q=searchQ.toLowerCase();
    active=active.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.co||'').toLowerCase().includes(q)||(l.sw||'').toLowerCase().includes(q)||(l.ph||'').includes(q));
  }
  document.getElementById('leads-list').innerHTML=active.length?active.map(rowHTML).join(''):`<div class="empty">No leads found</div>`;

  // Rejected tab
  const rej=leads.filter(l=>l.st==='rejected');
  document.getElementById('rejected-list').innerHTML=rej.length?rej.map(l=>{
    return `<div class="lead-row s-${t.cls}" onclick="openDetail('${l.id}')">
      <div class="dot rejected"></div>
      <div class="lead-info">
        <div class="lead-name">${l.name}</div>
        <div class="lead-sub">${[l.co,l.sw,l.rejectReason].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="lead-right">
        <div class="lead-tag rejected">Rejected</div>
        <div class="lead-date">${l.ph?l.ph.slice(-4):''}</div>
      </div>
    </div>`;
  }).join(''):`<div class="empty">No rejected leads</div>`;

  // Maintenance (closed cash only)
  const cash=leads.filter(l=>l.st==='closed'&&l.pay==='cash'&&l.cd).sort((a,b)=>(dl(a)||9999)-(dl(b)||9999));
  document.getElementById('maint-list').innerHTML=cash.length?cash.map(l=>{
    const d=dl(l),m=mDate(l),ov=d!=null&&d<0;
    return `<div class="lead-row s-${t.cls}" onclick="openDetail('${l.id}')">
      <div class="dot ${ov?'maint':'cash'}"></div>
      <div class="lead-info">
        <div class="lead-name">${l.name}</div>
        <div class="lead-sub">${l.co||''} · Due ${fmtDate(m)}</div>
      </div>
      <div class="lead-right">
        <div class="lead-tag ${ov?'rejected':'cash'}">${d==null?'—':ov?'Overdue':d===0?'Today':d+'d left'}</div>
        <div class="lead-date">₹${Number(l.amt||0).toLocaleString('en-IN')}</div>
      </div>
    </div>`;
  }).join(''):`<div class="empty">No cash clients yet</div>`;
}

_bridge.setDtFilter = window.setDtFilter = d=>{dtFilter=d;render();};
_bridge.setStFilter = window.setStFilter = (s,btn)=>{stFilter=s;document.querySelectorAll('#p-leads .chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();};

  `;
  document.getElementById('d-reject-btn-wrap').innerHTML=`
    ${isActive?`<button class="btn-danger" onclick="document.getElementById('d-reject-box').style.display='block';document.getElementById('r-notes').value=''">✕ Mark as Rejected</button>`:''}
    <div id="d-delete-confirm" style="display:none;background:#FAEAE9;border-radius:14px;padding:16px;margin-bottom:10px;">
      <p style="font-size:13px;color:var(--red);font-weight:600;margin-bottom:12px;">Delete this entry permanently?</p>
      <div style="display:flex;gap:10px;">
        <button class="btn-ghost" style="margin:0;flex:1;" onclick="document.getElementById('d-delete-confirm').style.display='none'">Cancel</button>
        <button class="btn-primary" style="margin:0;flex:1;background:var(--red);" onclick="deleteLead('${l.id}')">Delete</button>
      </div>
    </div>
    <button class="btn-ghost" style="color:#C0392B;border-color:#f0c8c5;margin-top:6px;" onclick="document.getElementById('d-delete-confirm').style.display='block'">🗑 Delete Entry</button>
  `;
  document.getElementById('detOv').classList.add('open');
};

  document.getElementById('updOv').classList.add('open');
};
_bridge.closeUpd = window.closeUpd=()=>document.getElementById('updOv').classList.remove('open');
_bridge.handleUpd = window.handleUpd=()=>{
  const s=document.getElementById('u-st').value;
  document.getElementById('u-dd-wrap').style.display=(s==='demo'||s==='redemo')?'block':'none';
  document.getElementById('u-pay-wrap').style.display=s==='closed'?'block':'none';
};
_bridge.saveUpd = window.saveUpd = async function() {
  const id=document.getElementById('u-id').value;
  const st=document.getElementById('u-st').value;
  const data={st};
  if(st==='demo'||st==='redemo'){data.dd=document.getElementById('u-dd').value;data.dtype=document.getElementById('u-dtype').value;}
  if(st==='closed'){data.pay=document.getElementById('u-pay').value;data.amt=document.getElementById('u-amt').value;data.cd=document.getElementById('u-cd').value;}
  await updateLead(id,data);
  closeUpd(); showToast('Updated');
};

_bridge.markDone = window.markDone = async function(id) {
  await updateLead(id,{cd:td()});
  closeDetail(); showToast('Maintenance reset ✓');
};

async function updateLead(id, data) {
  await updateDoc(doc(db,'leads',id), data);
}

// ── TOAST ──
_bridge.showToast = _bridge.onSearch = window.onSearch = function(val) {
  searchQ=val.trim();
  const clr=document.getElementById('search-clear');
  if(clr) clr.style.display=val?'block':'none';
  renderLeadsList();
};
_bridge.clearSearch = window.clearSearch = function() {
  searchQ='';
  const inp=document.getElementById('search-input');
  const clr=document.getElementById('search-clear');
  if(inp) inp.value='';
  if(clr) clr.style.display='none';
  renderLeadsList();
};
function renderLeadsList() {
  const t=td();
  const dates=[...new Set(leads.filter(l=>['call','demo','given','changes','redemo'].includes(l.st)).map(l=>l.dd).filter(Boolean))].sort().reverse();
  document.getElementById('date-chips').innerHTML=
    `<button class="chip ${dtFilter==='all'?'active':''}" onclick="setDtFilter('all')">All</button>`+
    dates.map(d=>`<button class="chip ${dtFilter===d?'active':''}" onclick="setDtFilter('${d}')">${d===t?'Today':fmt(d)}</button>`).join('');
  let active=leads.filter(l=>['call','demo','given','changes','redemo'].includes(l.st));
  if(dtFilter!=='all') active=active.filter(l=>l.dd===dtFilter);
  if(stFilter!=='all') active=active.filter(l=>l.st===stFilter);
  if(searchQ) {
    const q=searchQ.toLowerCase();
    active=active.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.co||'').toLowerCase().includes(q)||(l.sw||'').toLowerCase().includes(q)||(l.ph||'').includes(q));
  }
  document.getElementById('leads-list').innerHTML=active.length?active.map(rowHTML).join(''):`<div class="empty">No leads found</div>`;
}

_bridge.refreshData = window.refreshData = function() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'), 700);
  render();
  showToast('Refreshed');
};

window.showToast = function(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
};

['addOv','detOv','updOv','editOv'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});
</script>
