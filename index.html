<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Equal Softtech</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #EDF4FB; --white: #FFFFFF; --ink: #12304F;
  --muted: #7A9AB5; --line: #CCE0F0;
  --green: #1E7A5F; --amber: #B86E1A; --red: #C0392B; --accent: #2176AE; --r: 16px;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; max-width:430px; margin:0 auto; }

/* HEADER */
.hdr { padding:56px 24px 18px; background:var(--white); border-bottom:1px solid var(--line); }
.hdr-row { display:flex; justify-content:space-between; align-items:flex-start; }
.brand-sm { font-size:11px; color:var(--accent); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; }
.brand-lg { font-family:'DM Serif Display',serif; font-size:36px; color:var(--ink); line-height:1; font-weight:700; letter-spacing:-0.5px; }
.greeting { font-size:13px; color:var(--muted); margin-top:5px; font-weight:400; }
.add-fab { width:44px; height:44px; background:var(--accent); border-radius:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; color:#fff; font-size:22px; flex-shrink:0; transition:all 0.15s; font-family:'DM Sans',sans-serif; box-shadow:0 4px 12px rgba(33,118,174,0.3); }
.add-fab:active { opacity:0.75; }

/* TABS — scrollable 5 tabs */
.tabs { display:flex; background:var(--white); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:50; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex-shrink:0; padding:14px 16px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; background:none; border-top:none; border-left:none; border-right:none; font-family:'DM Sans',sans-serif; white-space:nowrap; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.body { padding:0 20px 100px; }

/* SUMMARY */
.summary { margin:20px 0 24px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.sum-card { background:var(--white); border-radius:20px; padding:20px; border:1px solid var(--line); box-shadow:0 2px 8px rgba(33,118,174,0.06); }
.sum-num { font-family:'DM Serif Display',serif; font-size:44px; line-height:1; margin-bottom:6px; font-weight:700; }
.sum-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.6px; }
.sum-card.hi { background:var(--accent); border-color:var(--accent); }
.sum-card.hi .sum-num { color:#fff; }
.sum-card.hi .sum-label { color:rgba(255,255,255,0.6); }

.sec-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }

/* LEAD LIST */
.lead-list { display:flex; flex-direction:column; gap:2px; }
.lead-row { background:var(--white); padding:16px 18px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:opacity 0.15s; }
.lead-row:first-child { border-radius:var(--r) var(--r) 0 0; }
.lead-row:last-child { border-radius:0 0 var(--r) var(--r); }
.lead-row:only-child { border-radius:var(--r); }
.lead-row { box-shadow:0 1px 3px rgba(33,118,174,0.05); }
.lead-row:active { opacity:0.6; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:2px; }
.dot.call { background:var(--accent); } .dot.demo { background:var(--amber); }
.dot.cheque { background:var(--green); } .dot.cash { background:var(--amber); }
.dot.rejected { background:var(--red); } .dot.maint { background:var(--red); }
.lead-info { flex:1; min-width:0; }
.lead-name { font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lead-sub { font-size:12px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lead-right { text-align:right; flex-shrink:0; }
.lead-tag { font-size:11px; font-weight:500; padding:3px 9px; border-radius:6px; display:inline-block; margin-bottom:3px; }
.lead-tag.call { background:#DDEEF9; color:var(--accent); }
.lead-tag.demo { background:#FBF3E8; color:var(--amber); }
.lead-tag.cheque { background:#E2F4EE; color:var(--green); }
.lead-tag.cash { background:#FBF3E8; color:var(--amber); }
.lead-tag.rejected { background:#FAEAE9; color:var(--red); }
.lead-date { font-size:11px; color:var(--muted); }

/* ALERTS */
.maint-alert { background:#FAEAE9; border-radius:var(--r); padding:13px 15px; margin-bottom:18px; display:flex; align-items:center; gap:11px; }
.maint-alert-icon { font-size:17px; flex-shrink:0; }
.maint-alert-text strong { color:var(--red); display:block; font-size:13px; font-weight:600; }
.maint-alert-text span { color:#999; font-size:12px; }

/* DATE CHIPS */
.chip-row { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; margin-bottom:14px; }
.chip-row::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:500; cursor:pointer; border:1.5px solid var(--line); background:var(--white); color:var(--muted); transition:all 0.15s; font-family:'DM Sans',sans-serif; }
.chip.active { border-color:var(--accent); background:var(--accent); color:#fff; }

.empty { text-align:center; padding:48px 24px; color:var(--muted); font-size:14px; }

/* OVERLAY */
.overlay { position:fixed; inset:0; background:rgba(18,48,79,0.3); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.25s; backdrop-filter:blur(3px); }
.overlay.open { opacity:1; pointer-events:all; }
.sheet { background:var(--white); border-radius:24px 24px 0 0; padding:20px 24px calc(40px + env(safe-area-inset-bottom,0px)); width:100%; max-height:92vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.3s cubic-bezier(.32,.72,0,1); }
.overlay.open .sheet { transform:translateY(0); }
.handle { width:32px; height:3px; background:var(--line); border-radius:2px; margin:0 auto 20px; }
.sheet-title { font-family:'DM Serif Display',serif; font-size:26px; margin-bottom:22px; color:var(--ink); font-weight:700; }

.field { margin-bottom:16px; }
.field label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:7px; }
.field input, .field select { width:100%; padding:13px 14px; background:var(--bg); border:1.5px solid var(--line); border-radius:12px; color:var(--ink); font-size:15px; font-family:'DM Sans',sans-serif; outline:none; -webkit-appearance:none; appearance:none; transition:border-color 0.15s; }
.field input:focus, .field select:focus { border-color:var(--accent); }
.two { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

.btn-primary { width:100%; padding:15px; background:var(--accent); color:#fff; border:none; border-radius:14px; font-size:15px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; margin-bottom:10px; transition:opacity 0.15s; }
.btn-primary:active { opacity:0.8; }
.btn-ghost { width:100%; padding:14px; background:transparent; color:var(--muted); border:1.5px solid var(--line); border-radius:14px; font-size:15px; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; }
.btn-danger { width:100%; padding:14px; background:transparent; color:var(--red); border:1.5px solid #f0c8c5; border-radius:14px; font-size:15px; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; margin-bottom:10px; }

/* DETAIL */
.detail-name { font-family:'DM Serif Display',serif; font-size:30px; margin-bottom:4px; font-weight:700; }
.detail-co { font-size:14px; color:var(--muted); margin-bottom:22px; }
.detail-row { display:flex; justify-content:space-between; align-items:center; padding:13px 0; border-bottom:1px solid var(--line); font-size:14px; }
.detail-row:last-of-type { border-bottom:none; }
.detail-row span:first-child { color:var(--muted); }
.detail-row span:last-child { font-weight:500; }
.d-actions { margin-top:22px; display:flex; flex-direction:column; gap:0; }

/* REJECT BOX */
.reject-box { background:#FAEAE9; border-radius:14px; padding:16px; margin-bottom:12px; display:none; }
.reject-box-title { font-size:14px; font-weight:600; color:var(--ink); margin-bottom:14px; }
.rrow { display:flex; gap:10px; }
.rrow button { flex:1; margin-bottom:0; }

/* FIREBASE STATUS */
.fb-status { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); margin-top:4px; }
.fb-dot { width:6px; height:6px; border-radius:50%; background:#ccc; flex-shrink:0; }
.fb-dot.live { background:#1E7A5F; }
.fb-dot.error { background:var(--red); }

/* TOAST */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-70px); background:var(--ink); color:#fff; padding:12px 22px; border-radius:24px; font-size:13px; font-weight:500; z-index:999; transition:transform 0.3s cubic-bezier(.32,.72,0,1); white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }



.panel { display:none; }
.panel.active { display:block; }
</style>
</head>
<body>



<!-- ══ MAIN APP ══ -->
<div id="app">

<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="brand-sm">Equal Softtech</div>
      <div class="brand-lg">DemoTrack</div>
      <div class="greeting" id="greeting"></div>
    </div>
    <button class="add-fab" onclick="openAdd()">+</button>
  </div>
  <div class="fb-status"><div class="fb-dot" id="fb-dot"></div><span id="fb-label">Connecting...</span></div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" onclick="go('today')">Today</button>
  <button class="tab" onclick="go('leads')">All Leads</button>
  <button class="tab" onclick="go('rejected')">Rejected</button>
  <button class="tab" onclick="go('maint')">Maintenance</button>
</div>

<div class="body">

  <!-- TODAY -->
  <div id="p-today" class="panel active">
    <div class="summary">
      <div class="sum-card hi">
        <div class="sum-num" id="s-demos">0</div>
        <div class="sum-label">Demos Today</div>
      </div>
      <div class="sum-card">
        <div class="sum-num" id="s-calls">0</div>
        <div class="sum-label">To Call</div>
      </div>
    </div>
    <div id="maint-alerts"></div>
    <div class="sec-label">Demos Scheduled</div>
    <div class="lead-list" id="today-list"></div>
  </div>

  <!-- ALL LEADS (call + demo only) -->
  <div id="p-leads" class="panel">
    <div style="height:18px;"></div>
    <div class="chip-row" id="date-chips"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <button class="chip active" onclick="setStFilter('all',this)">All</button>
      <button class="chip" onclick="setStFilter('call',this)">To Call</button>
      <button class="chip" onclick="setStFilter('demo',this)">Demo</button>
    </div>
    <div class="lead-list" id="leads-list"></div>
  </div>

  <!-- REJECTED -->
  <div id="p-rejected" class="panel">
    <div style="height:18px;"></div>
    <div class="sec-label">Rejected Leads</div>
    <div class="lead-list" id="rejected-list"></div>
  </div>

  <!-- MAINTENANCE (closed cash only) -->
  <div id="p-maint" class="panel">
    <div style="height:18px;"></div>
    <div class="sec-label">Cash clients — 1 year cycle</div>
    <div class="lead-list" id="maint-list"></div>
  </div>

</div>
</div><!-- end #app -->

<!-- ADD LEAD -->
<div class="overlay" id="addOv">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">New Lead</div>
    <div class="field"><label>Name</label><input id="f-name" type="text" placeholder="Ramesh Patel"></div>
    <div class="field"><label>Company</label><input id="f-co" type="text" placeholder="Patel Traders"></div>
    <div class="field"><label>Phone</label><input id="f-ph" type="tel" placeholder="98765 43210"></div>
    <div class="field"><label>Software</label><input id="f-sw" type="text" placeholder="e.g. Loom, Acc Dyeing, Billing..."></div>
    <div class="field"><label>Reference Person</label><input id="f-ref" type="text" placeholder="Who referred this lead?"></div>
    <div class="field"><label>Status</label>
      <select id="f-st" onchange="handleAdd()">
        <option value="call">To Call</option>
        <option value="demo">Demo</option>
        <option value="closed">Closed</option>
      </select>
    </div>
    <div id="f-demo-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Demo Date</label><input id="f-dd" type="date"></div>
        <div class="field"><label>Demo Type</label>
          <select id="f-dtype"><option value="offline">Offline</option><option value="online">Online</option></select>
        </div>
      </div>
    </div>
    <div id="f-pay-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Payment</label>
          <select id="f-pay"><option value="cheque">Cheque</option><option value="cash">Cash</option></select>
        </div>
        <div class="field"><label>Amount ₹</label><input id="f-amt" type="number" placeholder="25000"></div>
      </div>
      <div class="field"><label>Closing Date</label><input id="f-cd" type="date"></div>
    </div>
    <div class="field"><label>Notes</label><input id="f-notes" type="text" placeholder="Optional..."></div>
    <button class="btn-primary" onclick="saveLead()">Save Lead</button>
    <button class="btn-ghost" onclick="closeAdd()">Cancel</button>
  </div>
</div>

<!-- LEAD DETAIL -->
<div class="overlay" id="detOv">
  <div class="sheet">
    <div class="handle"></div>
    <div class="detail-name" id="d-name"></div>
    <div class="detail-co" id="d-co"></div>
    <div id="d-rows"></div>
    <div class="d-actions">
      <div id="d-action-btns"></div>
      <div class="reject-box" id="d-reject-box">
        <div class="reject-box-title">Why did they reject?</div>
        <div class="field">
          <label>Reason</label>
          <select id="r-reason">
            <option>Too expensive</option>
            <option>Not interested</option>
            <option>Using competitor software</option>
            <option>No budget right now</option>
            <option>Need more time</option>
            <option>Feature not available</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:14px;">
          <label>Extra Notes (optional)</label>
          <input type="text" id="r-notes" placeholder="Any additional info...">
        </div>
        <div class="rrow">
          <button class="btn-ghost" onclick="document.getElementById('d-reject-box').style.display='none'">Cancel</button>
          <button class="btn-primary" style="margin:0;background:var(--red);" onclick="confirmReject()">Confirm</button>
        </div>
      </div>
      <div id="d-reject-btn-wrap"></div>
    </div>
  </div>
</div>

<!-- UPDATE STATUS -->
<div class="overlay" id="updOv">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="u-title"></div>
    <input type="hidden" id="u-id">
    <div class="field"><label>Status</label>
      <select id="u-st" onchange="handleUpd()">
        <option value="call">To Call</option>
        <option value="demo">Demo</option>
        <option value="closed">Closed</option>
      </select>
    </div>
    <div id="u-dd-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Demo Date</label><input id="u-dd" type="date"></div>
        <div class="field"><label>Demo Type</label>
          <select id="u-dtype"><option value="offline">Offline</option><option value="online">Online</option></select>
        </div>
      </div>
    </div>
    <div id="u-pay-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Payment</label>
          <select id="u-pay"><option value="cheque">Cheque</option><option value="cash">Cash</option></select>
        </div>
        <div class="field"><label>Amount ₹</label><input id="u-amt" type="number"></div>
      </div>
      <div class="field"><label>Closing Date</label><input id="u-cd" type="date"></div>
    </div>
    <button class="btn-primary" onclick="saveUpd()">Update</button>
    <button class="btn-ghost" onclick="closeUpd()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Global function bridge (module scope fix) -->
<script>
const _bridge = {};
function go(t){_bridge.go&&_bridge.go(t)}
function openAdd(){_bridge.openAdd&&_bridge.openAdd()}
function closeAdd(){_bridge.closeAdd&&_bridge.closeAdd()}
function handleAdd(){_bridge.handleAdd&&_bridge.handleAdd()}
function saveLead(){_bridge.saveLead&&_bridge.saveLead()}
function openDetail(id){_bridge.openDetail&&_bridge.openDetail(id)}
function closeDetail(){_bridge.closeDetail&&_bridge.closeDetail()}
function confirmReject(){_bridge.confirmReject&&_bridge.confirmReject()}
function openUpd(id){_bridge.openUpd&&_bridge.openUpd(id)}
function closeUpd(){_bridge.closeUpd&&_bridge.closeUpd()}
function handleUpd(){_bridge.handleUpd&&_bridge.handleUpd()}
function saveUpd(){_bridge.saveUpd&&_bridge.saveUpd()}
function markDone(id){_bridge.markDone&&_bridge.markDone(id)}
function setDtFilter(d){_bridge.setDtFilter&&_bridge.setDtFilter(d)}
function setStFilter(s,btn){_bridge.setStFilter&&_bridge.setStFilter(s,btn)}
function showToast(m){_bridge.showToast&&_bridge.showToast(m)}
</script>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── HELPERS ──
const td  = () => new Date().toISOString().split('T')[0];
const fmt = d => { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}); };
const fmtY= d => { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); };
const mDate=l => { if(!l.cd) return null; const d=new Date(l.cd+'T00:00:00'); d.setFullYear(d.getFullYear()+1); return d; };
const dl  = l => { const m=mDate(l); if(!m) return null; return Math.ceil((m-new Date())/86400000); };

const hr=new Date().getHours();
document.getElementById('greeting').textContent=(hr<12?'Good morning':hr<17?'Good afternoon':'Good evening')+', Nilesh 👋';

let leads=[], db=null, rejectId=null, stFilter='all', dtFilter='all';

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyBYg9QnvpQg-NMWzvRjXrr_4V9X3dHZYmY",
  authDomain: "equal-softtech.firebaseapp.com",
  projectId: "equal-softtech",
  storageBucket: "equal-softtech.firebasestorage.app",
  messagingSenderId: "163914755343",
  appId: "1:163914755343:web:079b349e1365f9a41a627a"
};

// ── STATUS ──
function setFbStatus(state, label) {
  const dot=document.getElementById('fb-dot');
  const lbl=document.getElementById('fb-label');
  if(dot) dot.className='fb-dot'+(state==='live'?' live':state==='error'?' error':'');
  if(lbl) lbl.textContent=label;
}
_bridge.setFbStatus = setFbStatus;

// ── INIT FIREBASE ──
const firebaseApp = initializeApp(firebaseConfig);
db = getFirestore(firebaseApp);
setFbStatus('connecting','Connecting...');

onSnapshot(collection(db,'leads'), snap => {
  leads = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  setFbStatus('live','Live • '+leads.length+' leads');
  render();
}, err => {
  setFbStatus('error','Error: '+err.code);
  console.error('Firestore error:', err);
});

// ── TABS ──
_bridge.go = window.go = function(tab) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('p-'+tab).classList.add('active');
  const idx={today:0,leads:1,rejected:2,maint:3};
  document.querySelectorAll('.tab')[idx[tab]]?.classList.add('active');
  render();
};

// ── TAG ──
function tagFor(l) {
  if(l.st==='call')     return {cls:'call',     txt:'To Call'};
  if(l.st==='demo')     return {cls:'demo',     txt:'Demo'};
  if(l.st==='rejected') return {cls:'rejected', txt:'Rejected'};
  return l.pay==='cheque'?{cls:'cheque',txt:'Cheque'}:{cls:'cash',txt:'Cash'};
}

// ── ROW HTML ──
function rowHTML(l) {
  const t=tagFor(l);
  const parts=[l.co,l.sw,l.dd?(l.dd===td()?'Today':fmt(l.dd)):null].filter(Boolean);
  const typeLabel=l.dtype&&l.st==='demo'?' · '+l.dtype.charAt(0).toUpperCase()+l.dtype.slice(1):'';
  return `<div class="lead-row" onclick="openDetail('${l.id}')">
    <div class="dot ${t.cls}"></div>
    <div class="lead-info">
      <div class="lead-name">${l.name}</div>
      <div class="lead-sub">${parts.join(' · ')}</div>
    </div>
    <div class="lead-right">
      <div class="lead-tag ${t.cls}">${t.txt}${typeLabel}</div>
      <div class="lead-date">${l.ph?l.ph.slice(-4):''}</div>
    </div>
  </div>`;
}

// ── RENDER ──
function render() {
  const t=td();

  // Stats
  document.getElementById('s-demos').textContent=leads.filter(l=>l.dd===t&&l.st==='demo').length;
  document.getElementById('s-calls').textContent=leads.filter(l=>l.st==='call').length;

  // Maint alerts
  const due=leads.filter(l=>l.pay==='cash'&&l.cd).map(l=>({l,d:dl(l)})).filter(x=>x.d!=null&&x.d>=0&&x.d<=30);
  document.getElementById('maint-alerts').innerHTML=due.map(({l,d})=>
    `<div class="maint-alert"><div class="maint-alert-icon">⚠️</div><div class="maint-alert-text"><strong>${l.name}</strong><span>${l.co||''} · Maintenance ${d===0?'today':'in '+d+' days'}</span></div></div>`).join('');

  // Today demos
  const demos=leads.filter(l=>l.dd===t&&l.st==='demo');
  document.getElementById('today-list').innerHTML=demos.length?demos.map(rowHTML).join(''):`<div class="empty">No demos scheduled today</div>`;

  // All leads (call + demo only — NOT closed or rejected)
  const dates=[...new Set(leads.filter(l=>l.st==='call'||l.st==='demo').map(l=>l.dd).filter(Boolean))].sort().reverse();
  document.getElementById('date-chips').innerHTML=
    `<button class="chip ${dtFilter==='all'?'active':''}" onclick="setDtFilter('all')">All</button>`+
    dates.map(d=>`<button class="chip ${dtFilter===d?'active':''}" onclick="setDtFilter('${d}')">${d===t?'Today':fmt(d)}</button>`).join('');

  let active=leads.filter(l=>l.st==='call'||l.st==='demo');
  if(dtFilter!=='all') active=active.filter(l=>l.dd===dtFilter);
  if(stFilter!=='all') active=active.filter(l=>l.st===stFilter);
  document.getElementById('leads-list').innerHTML=active.length?active.map(rowHTML).join(''):`<div class="empty">No leads found</div>`;

  // Rejected tab
  const rej=leads.filter(l=>l.st==='rejected');
  document.getElementById('rejected-list').innerHTML=rej.length?rej.map(l=>{
    return `<div class="lead-row" onclick="openDetail('${l.id}')">
      <div class="dot rejected"></div>
      <div class="lead-info">
        <div class="lead-name">${l.name}</div>
        <div class="lead-sub">${[l.co,l.sw,l.rejectReason].filter(Boolean).join(' · ')}</div>
      </div>
      <div class="lead-right">
        <div class="lead-tag rejected">Rejected</div>
        <div class="lead-date">${l.ph?l.ph.slice(-4):''}</div>
      </div>
    </div>`;
  }).join(''):`<div class="empty">No rejected leads</div>`;

  // Maintenance (closed cash only)
  const cash=leads.filter(l=>l.st==='closed'&&l.pay==='cash'&&l.cd).sort((a,b)=>(dl(a)||9999)-(dl(b)||9999));
  document.getElementById('maint-list').innerHTML=cash.length?cash.map(l=>{
    const d=dl(l),m=mDate(l),ov=d!=null&&d<0;
    return `<div class="lead-row" onclick="openDetail('${l.id}')">
      <div class="dot ${ov?'maint':'cash'}"></div>
      <div class="lead-info">
        <div class="lead-name">${l.name}</div>
        <div class="lead-sub">${l.co||''} · Due ${fmtY(m?.toISOString().split('T')[0])}</div>
      </div>
      <div class="lead-right">
        <div class="lead-tag ${ov?'rejected':'cash'}">${d==null?'—':ov?'Overdue':d===0?'Today':d+'d left'}</div>
        <div class="lead-date">₹${Number(l.amt||0).toLocaleString('en-IN')}</div>
      </div>
    </div>`;
  }).join(''):`<div class="empty">No cash clients yet</div>`;
}

_bridge.setDtFilter = window.setDtFilter = d=>{dtFilter=d;render();};
_bridge.setStFilter = window.setStFilter = (s,btn)=>{stFilter=s;document.querySelectorAll('#p-leads .chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();};

// ── DETAIL ──
_bridge.openDetail = window.openDetail = function(id) {
  const l=leads.find(x=>x.id===id); if(!l) return;
  rejectId=id;
  document.getElementById('d-name').textContent=l.name;
  document.getElementById('d-co').textContent=l.co||'';
  document.getElementById('d-reject-box').style.display='none';
  const t=tagFor(l),d=dl(l),m=mDate(l);
  document.getElementById('d-rows').innerHTML=`
    <div class="detail-row"><span>Phone</span><span><a href="tel:${l.ph}" style="color:var(--accent);font-weight:500;">${l.ph}</a></span></div>
    <div class="detail-row"><span>Status</span><span class="lead-tag ${t.cls}">${t.txt}</span></div>
    ${l.sw?`<div class="detail-row"><span>Software</span><span>${l.sw}</span></div>`:''}
    ${l.ref?`<div class="detail-row"><span>Reference</span><span>${l.ref}</span></div>`:''}
    ${l.dd?`<div class="detail-row"><span>Demo Date</span><span>${fmtY(l.dd)}${l.dtype?' · '+l.dtype.charAt(0).toUpperCase()+l.dtype.slice(1):''}</span></div>`:''}
    ${l.amt?`<div class="detail-row"><span>Amount</span><span>₹${Number(l.amt).toLocaleString('en-IN')}</span></div>`:''}
    ${l.cd?`<div class="detail-row"><span>Closed On</span><span>${fmtY(l.cd)}</span></div>`:''}
    ${m?`<div class="detail-row"><span>Maintenance</span><span style="color:${d!=null&&d<=30?'var(--red)':'inherit'}">${fmtY(m.toISOString().split('T')[0])}${d!=null?' ('+d+'d)':''}</span></div>`:''}
    ${l.rejectReason?`<div class="detail-row"><span>Rejected — Reason</span><span style="color:var(--red)">${l.rejectReason}</span></div>`:''}
    ${l.rejectNotes?`<div class="detail-row"><span>Reject Notes</span><span>${l.rejectNotes}</span></div>`:''}
    ${l.notes?`<div class="detail-row"><span>Notes</span><span>${l.notes}</span></div>`:''}
  `;
  const isActive = l.st==='call'||l.st==='demo';
  document.getElementById('d-action-btns').innerHTML=`
    <a href="tel:${l.ph}" class="btn-ghost" style="margin-bottom:10px;display:block;text-align:center;text-decoration:none;">📞 Call</a>
    ${isActive?`<button class="btn-primary" onclick="closeDetail();openUpd('${l.id}')">Update Status</button>`:''}
    ${l.pay==='cash'&&d!=null&&d<=30?`<button class="btn-ghost" style="margin-bottom:10px;border-color:var(--green);color:var(--green);" onclick="markDone('${l.id}')">✅ Maintenance Done</button>`:''}
  `;
  document.getElementById('d-reject-btn-wrap').innerHTML=`
    ${isActive?`<button class="btn-danger" onclick="document.getElementById('d-reject-box').style.display='block';document.getElementById('r-notes').value=''">✕ Mark as Rejected</button>`:''}
    <div id="d-delete-confirm" style="display:none;background:#FAEAE9;border-radius:14px;padding:16px;margin-bottom:10px;">
      <p style="font-size:13px;color:var(--red);font-weight:600;margin-bottom:12px;">Delete this entry permanently?</p>
      <div style="display:flex;gap:10px;">
        <button class="btn-ghost" style="margin:0;flex:1;" onclick="document.getElementById('d-delete-confirm').style.display='none'">Cancel</button>
        <button class="btn-primary" style="margin:0;flex:1;background:var(--red);" onclick="deleteLead('${l.id}')">Delete</button>
      </div>
    </div>
    <button class="btn-ghost" style="color:#C0392B;border-color:#f0c8c5;margin-top:6px;" onclick="document.getElementById('d-delete-confirm').style.display='block'">🗑 Delete Entry</button>
  `;
  document.getElementById('detOv').classList.add('open');
};
_bridge.closeDetail = window.closeDetail=()=>document.getElementById('detOv').classList.remove('open');

// ── REJECT ──
_bridge.confirmReject = window.confirmReject = async function() {
  if(!rejectId) return;
  const data={st:'rejected',rejectReason:document.getElementById('r-reason').value,rejectNotes:document.getElementById('r-notes').value.trim()};
  await updateLead(rejectId, data);
  closeDetail(); showToast('Marked as rejected');
};

// ── DELETE ──
_bridge.deleteLead = window.deleteLead = async function(id) {
  if(!db) return;
  await deleteDoc(doc(db,'leads',id));
  closeDetail(); showToast('Entry deleted');
};

// ── ADD ──
_bridge.openAdd = window.openAdd = function() {
  ['f-name','f-co','f-ph','f-sw','f-ref','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-st').value='call';
  document.getElementById('f-dd').value=td();
  document.getElementById('f-cd').value=td();
  document.getElementById('f-amt').value='';
  document.getElementById('f-pay').value='cheque';
  document.getElementById('f-dtype').value='offline';
  handleAdd();
  document.getElementById('addOv').classList.add('open');
};
_bridge.closeAdd = window.closeAdd=()=>document.getElementById('addOv').classList.remove('open');
_bridge.handleAdd = window.handleAdd=()=>{
  const st=document.getElementById('f-st').value;
  document.getElementById('f-demo-wrap').style.display=st==='demo'?'block':'none';
  document.getElementById('f-pay-wrap').style.display=st==='closed'?'block':'none';
};
_bridge.saveLead = window.saveLead = async function() {
  const name=document.getElementById('f-name').value.trim();
  const ph=document.getElementById('f-ph').value.trim();
  if(!name||!ph){showToast('Name & phone required');return;}
  const st=document.getElementById('f-st').value;
  const lead={
    name, co:document.getElementById('f-co').value.trim(), ph,
    sw:document.getElementById('f-sw').value.trim(),
    ref:document.getElementById('f-ref').value.trim(),
    st,
    dd:st==='demo'?document.getElementById('f-dd').value:null,
    dtype:st==='demo'?document.getElementById('f-dtype').value:null,
    pay:st==='closed'?document.getElementById('f-pay').value:null,
    amt:st==='closed'?document.getElementById('f-amt').value:null,
    cd:st==='closed'?document.getElementById('f-cd').value:null,
    notes:document.getElementById('f-notes').value.trim(),
    createdAt: Date.now()
  };
  await addDoc(collection(db,'leads'), lead);
  closeAdd(); showToast('Lead saved');
};

// ── UPDATE ──
_bridge.openUpd = window.openUpd = function(id) {
  const l=leads.find(x=>x.id===id); if(!l) return;
  document.getElementById('u-id').value=id;
  document.getElementById('u-title').textContent=l.name;
  document.getElementById('u-st').value=l.st==='rejected'?'call':l.st;
  document.getElementById('u-dd').value=l.dd||td();
  document.getElementById('u-dtype').value=l.dtype||'offline';
  document.getElementById('u-pay').value=l.pay||'cheque';
  document.getElementById('u-amt').value=l.amt||'';
  document.getElementById('u-cd').value=l.cd||td();
  handleUpd();
  document.getElementById('updOv').classList.add('open');
};
_bridge.closeUpd = window.closeUpd=()=>document.getElementById('updOv').classList.remove('open');
_bridge.handleUpd = window.handleUpd=()=>{
  const s=document.getElementById('u-st').value;
  document.getElementById('u-dd-wrap').style.display=s==='demo'?'block':'none';
  document.getElementById('u-pay-wrap').style.display=s==='closed'?'block':'none';
};
_bridge.saveUpd = window.saveUpd = async function() {
  const id=document.getElementById('u-id').value;
  const st=document.getElementById('u-st').value;
  const data={st};
  if(st==='demo'){data.dd=document.getElementById('u-dd').value;data.dtype=document.getElementById('u-dtype').value;}
  if(st==='closed'){data.pay=document.getElementById('u-pay').value;data.amt=document.getElementById('u-amt').value;data.cd=document.getElementById('u-cd').value;}
  await updateLead(id,data);
  closeUpd(); showToast('Updated');
};

_bridge.markDone = window.markDone = async function(id) {
  await updateLead(id,{cd:td()});
  closeDetail(); showToast('Maintenance reset ✓');
};

async function updateLead(id, data) {
  await updateDoc(doc(db,'leads',id), data);
}

// ── TOAST ──
_bridge.showToast = window.showToast = function(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
};

['addOv','detOv','updOv'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});
</script>
</body>
</html>
