<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Equal Softtech</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #EDF4FB;
  --white: #FFFFFF;
  --ink: #12304F;
  --muted: #7A9AB5;
  --line: #CCE0F0;
  --green: #1E7A5F;
  --amber: #B86E1A;
  --red: #C0392B;
  --accent: #2176AE;
  --r: 16px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
}

/* HEADER */
.hdr { padding: 52px 24px 16px; background: var(--white); border-bottom: 1px solid var(--line); }
.hdr-row { display: flex; justify-content: space-between; align-items: flex-start; }
.brand-sm { font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.brand-lg { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--ink); line-height: 1; }
.greeting { font-size: 12px; color: var(--muted); margin-top: 3px; }
.add-fab {
  width: 40px; height: 40px; background: var(--accent);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none; color: #fff; font-size: 22px; line-height: 1;
  flex-shrink: 0; transition: opacity 0.15s; font-family: 'DM Sans', sans-serif;
}
.add-fab:active { opacity: 0.75; }

/* TABS */
.tabs {
  display: flex; background: var(--white);
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 50;
}
.tab {
  flex: 1; text-align: center; padding: 12px 4px;
  font-size: 12px; font-weight: 500; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s; background: none;
  border-top: none; border-left: none; border-right: none;
  font-family: 'DM Sans', sans-serif;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* BODY */
.body { padding: 0 20px 100px; }

/* SUMMARY — only 2 cards now */
.summary { margin: 20px 0 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sum-card { background: var(--white); border-radius: var(--r); padding: 16px; border: 1px solid var(--line); }
.sum-num { font-family: 'DM Serif Display', serif; font-size: 38px; line-height: 1; margin-bottom: 4px; }
.sum-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
.sum-card.hi { background: var(--accent); border-color: var(--accent); }
.sum-card.hi .sum-num { color: #fff; }
.sum-card.hi .sum-label { color: rgba(255,255,255,0.6); }

/* SEC LABEL */
.sec-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; margin-top: 2px; }

/* LEAD LIST */
.lead-list { display: flex; flex-direction: column; gap: 1px; }
.lead-row {
  background: var(--white); padding: 15px 16px;
  display: flex; align-items: center; gap: 13px;
  cursor: pointer; transition: opacity 0.15s; border-radius: 0;
}
.lead-row:first-child { border-radius: var(--r) var(--r) 0 0; }
.lead-row:last-child { border-radius: 0 0 var(--r) var(--r); }
.lead-row:only-child { border-radius: var(--r); }
.lead-row:active { opacity: 0.6; }

.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
.dot.call { background: var(--accent); }
.dot.demo { background: var(--amber); }
.dot.cheque { background: var(--green); }
.dot.cash { background: var(--amber); }
.dot.maint { background: var(--red); }

.lead-info { flex: 1; min-width: 0; }
.lead-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lead-sub { font-size: 12px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lead-right { text-align: right; flex-shrink: 0; }
.lead-tag { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 6px; display: inline-block; margin-bottom: 3px; }
.lead-tag.call { background: #DDEEF9; color: var(--accent); }
.lead-tag.demo { background: #FBF3E8; color: var(--amber); }
.lead-tag.cheque { background: #E2F4EE; color: var(--green); }
.lead-tag.cash { background: #FBF3E8; color: var(--amber); }
.lead-tag.maint { background: #FAEAE9; color: var(--red); }
.lead-date { font-size: 11px; color: var(--muted); }

/* MAINT ALERT */
.maint-alert {
  background: #FAEAE9; border-radius: var(--r);
  padding: 13px 15px; margin-bottom: 18px;
  display: flex; align-items: center; gap: 11px;
}
.maint-alert-icon { font-size: 17px; flex-shrink: 0; }
.maint-alert-text strong { color: var(--red); display: block; font-size: 13px; font-weight: 600; }
.maint-alert-text span { color: #999; font-size: 12px; }

/* CHIPS */
.chip-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 14px; }
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  border: 1.5px solid var(--line); background: var(--white); color: var(--muted);
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }

.filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  border: 1.5px solid var(--line); background: var(--white); color: var(--muted);
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.filter-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

.empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }

/* OVERLAY / SHEET */
.overlay {
  position: fixed; inset: 0; background: rgba(18,48,79,0.3);
  z-index: 200; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s; backdrop-filter: blur(3px);
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  background: var(--white); border-radius: 24px 24px 0 0;
  padding: 20px 24px calc(40px + env(safe-area-inset-bottom, 0px));
  width: 100%; max-height: 92vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.32,.72,0,1);
}
.overlay.open .sheet { transform: translateY(0); }
.handle { width: 32px; height: 3px; background: var(--line); border-radius: 2px; margin: 0 auto 20px; }
.sheet-title { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 22px; color: var(--ink); }

.field { margin-bottom: 16px; }
.field label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 7px; }
.field input, .field select {
  width: 100%; padding: 13px 14px;
  background: var(--bg); border: 1.5px solid var(--line);
  border-radius: 12px; color: var(--ink); font-size: 15px;
  font-family: 'DM Sans', sans-serif; outline: none;
  -webkit-appearance: none; appearance: none; transition: border-color 0.15s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-primary {
  width: 100%; padding: 15px; background: var(--accent); color: #fff;
  border: none; border-radius: 14px; font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  margin-bottom: 10px; transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.8; }
.btn-ghost {
  width: 100%; padding: 14px; background: transparent; color: var(--muted);
  border: 1.5px solid var(--line); border-radius: 14px;
  font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif;
  margin-bottom: 0;
}
.btn-danger {
  width: 100%; padding: 14px; background: transparent; color: var(--red);
  border: 1.5px solid #f0c8c5; border-radius: 14px;
  font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif;
  margin-bottom: 10px;
}

/* DETAIL */
.detail-name { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 3px; color: var(--ink); }
.detail-co { font-size: 14px; color: var(--muted); margin-bottom: 22px; }
.detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 0; border-bottom: 1px solid var(--line); font-size: 14px;
}
.detail-row:last-of-type { border-bottom: none; }
.detail-row span:first-child { color: var(--muted); }
.detail-row span:last-child { font-weight: 500; }
.d-actions { display: flex; flex-direction: column; gap: 0; margin-top: 22px; }

/* CONFIRM DELETE */
.confirm-box {
  background: #FAEAE9; border-radius: 14px; padding: 16px;
  margin-bottom: 12px; text-align: center; display: none;
}
.confirm-box p { font-size: 14px; color: var(--red); margin-bottom: 14px; font-weight: 500; }
.confirm-row { display: flex; gap: 10px; }
.confirm-row button { flex: 1; }

/* TOAST */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-70px);
  background: var(--ink); color: #fff;
  padding: 12px 22px; border-radius: 24px;
  font-size: 13px; font-weight: 500; z-index: 999;
  transition: transform 0.3s cubic-bezier(.32,.72,0,1); white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.panel { display: none; }
.panel.active { display: block; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="brand-sm">Equal Softtech</div>
      <div class="brand-lg">DemoTrack</div>
      <div class="greeting" id="greeting"></div>
    </div>
    <button class="add-fab" onclick="openAdd()">+</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="go('today')">Today</button>
  <button class="tab" onclick="go('leads')">All Leads</button>
  <button class="tab" onclick="go('maint')">Maintenance</button>
</div>

<div class="body">

  <!-- TODAY -->
  <div id="p-today" class="panel active">
    <div class="summary">
      <div class="sum-card hi">
        <div class="sum-num" id="s-demos">0</div>
        <div class="sum-label">Demos Today</div>
      </div>
      <div class="sum-card">
        <div class="sum-num" id="s-calls">0</div>
        <div class="sum-label">To Call</div>
      </div>
    </div>
    <div id="maint-alerts"></div>
    <div class="sec-label">Demos Scheduled</div>
    <div class="lead-list" id="today-list"></div>
  </div>

  <!-- ALL LEADS -->
  <div id="p-leads" class="panel">
    <div style="height:18px;"></div>
    <div class="chip-row" id="date-chips"></div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setSt('all',this)">All</button>
      <button class="filter-btn" onclick="setSt('call',this)">Call</button>
      <button class="filter-btn" onclick="setSt('demo',this)">Demo</button>
      <button class="filter-btn" onclick="setSt('closed',this)">Closed</button>
      <button class="filter-btn" onclick="setSt('rejected',this)">Rejected</button>
    </div>
    <div class="lead-list" id="leads-list"></div>
  </div>

  <!-- MAINTENANCE -->
  <div id="p-maint" class="panel">
    <div style="height:18px;"></div>
    <div class="sec-label">Cash clients — 1 year cycle</div>
    <div class="lead-list" id="maint-list"></div>
  </div>

</div>

<!-- ADD LEAD -->
<div class="overlay" id="addOv">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">New Lead</div>
    <div class="field"><label>Name</label><input id="f-name" type="text" placeholder="Ramesh Patel"></div>
    <div class="field"><label>Company</label><input id="f-co" type="text" placeholder="Patel Traders"></div>
    <div class="field"><label>Phone</label><input id="f-ph" type="tel" placeholder="98765 43210"></div>
    <div class="field"><label>Software</label><input id="f-sw" type="text" placeholder="e.g. Loom, Acc Dyeing, Billing..."></div>
    <div class="field"><label>Reference Person</label><input id="f-ref" type="text" placeholder="Who referred this lead?"></div>
    <div class="field"><label>Status</label>
      <select id="f-st" onchange="handleAdd()">
        <option value="call">To Call</option>
        <option value="demo">Demo</option>
        <option value="closed">Closed</option>
      </select>
    </div>
    <div id="f-demo-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Demo Date</label><input id="f-dd" type="date"></div>
        <div class="field"><label>Demo Type</label>
          <select id="f-dtype">
            <option value="offline">Offline</option>
            <option value="online">Online</option>
          </select>
        </div>
      </div>
    </div>
    <div id="f-pay-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Payment</label>
          <select id="f-pay">
            <option value="cheque">Cheque</option>
            <option value="cash">Cash</option>
          </select>
        </div>
        <div class="field"><label>Amount ₹</label><input id="f-amt" type="number" placeholder="25000"></div>
      </div>
      <div class="field"><label>Closing Date</label><input id="f-cd" type="date"></div>
    </div>
    <div class="field"><label>Notes</label><input id="f-notes" type="text" placeholder="Optional..."></div>
    <button class="btn-primary" onclick="saveLead()">Save Lead</button>
    <button class="btn-ghost" onclick="closeAdd()">Cancel</button>
  </div>
</div>

<!-- LEAD DETAIL -->
<div class="overlay" id="detOv">
  <div class="sheet">
    <div class="handle"></div>
    <div class="detail-name" id="d-name"></div>
    <div class="detail-co" id="d-co"></div>
    <div id="d-rows"></div>
    <div class="d-actions">
      <div id="d-action-btns"></div>
      <div class="confirm-box" id="d-confirm">
        <p>Mark as Rejected</p>
        <div class="field" style="text-align:left;margin-bottom:12px;">
          <label>Reason for Rejection</label>
          <select id="reject-reason" style="width:100%;padding:11px 12px;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;color:var(--ink);font-size:14px;font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none;outline:none;">
            <option value="Too expensive">Too expensive</option>
            <option value="Not interested">Not interested</option>
            <option value="Using competitor software">Using competitor software</option>
            <option value="No budget right now">No budget right now</option>
            <option value="Need more time">Need more time</option>
            <option value="Feature not available">Feature not available</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field" style="text-align:left;margin-bottom:14px;">
          <label>Extra Notes (optional)</label>
          <input type="text" id="reject-notes" placeholder="Any additional info..." style="width:100%;padding:11px 12px;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;color:var(--ink);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;">
        </div>
        <div class="confirm-row">
          <button class="btn-ghost" style="margin:0;" onclick="document.getElementById('d-confirm').style.display='none'">Cancel</button>
          <button class="btn-primary" style="margin:0;background:var(--red);" onclick="confirmReject()">Mark Rejected</button>
        </div>
      </div>
      <span id="d-reject-btn"></span>
    </div>
  </div>
</div>

<!-- UPDATE STATUS -->
<div class="overlay" id="updOv">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="u-title"></div>
    <input type="hidden" id="u-id">
    <div class="field"><label>Status</label>
      <select id="u-st" onchange="handleUpd()">
        <option value="call">To Call</option>
        <option value="demo">Demo</option>
        <option value="closed">Closed</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <div id="u-dd-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Demo Date</label><input id="u-dd" type="date"></div>
        <div class="field"><label>Demo Type</label>
          <select id="u-dtype">
            <option value="offline">Offline</option>
            <option value="online">Online</option>
          </select>
        </div>
      </div>
    </div>
    <div id="u-pay-wrap" style="display:none;">
      <div class="two">
        <div class="field"><label>Payment</label>
          <select id="u-pay"><option value="cheque">Cheque</option><option value="cash">Cash</option></select>
        </div>
        <div class="field"><label>Amount ₹</label><input id="u-amt" type="number"></div>
      </div>
      <div class="field"><label>Closing Date</label><input id="u-cd" type="date"></div>
    </div>
    <button class="btn-primary" onclick="saveUpd()">Update</button>
    <button class="btn-ghost" onclick="closeUpd()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let leads = JSON.parse(localStorage.getItem('es-leads') || '[]');
let stFilter = 'all', dtFilter = 'all';
let deleteId = null;

const td  = () => new Date().toISOString().split('T')[0];
const fmt = d => { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}); };
const fmtY= d => { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); };
const mDate= l => { if(!l.cd) return null; const d=new Date(l.cd+'T00:00:00'); d.setFullYear(d.getFullYear()+1); return d; };
const dl  = l => { const m=mDate(l); if(!m) return null; return Math.ceil((m-new Date())/86400000); };
const save= () => localStorage.setItem('es-leads', JSON.stringify(leads));

// Greeting
const hr = new Date().getHours();
document.getElementById('greeting').textContent = (hr<12?'Good morning':hr<17?'Good afternoon':'Good evening')+', Nilesh 👋';



// ── TABS ──
function go(tab) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('p-'+tab).classList.add('active');
  const idx={today:0,leads:1,maint:2};
  document.querySelectorAll('.tab')[idx[tab]].classList.add('active');
  render();
}

// ── TAG ──
function tagFor(l) {
  if(l.st==='call') return {cls:'call',txt:'To Call'};
  if(l.st==='demo') return {cls:'demo',txt:'Demo'};
  if(l.st==='rejected') return {cls:'maint',txt:'Rejected'};
  return l.pay==='cheque'?{cls:'cheque',txt:'Cheque'}:{cls:'cash',txt:'Cash'};
}

// ── ROW ──
function rowHTML(l) {
  const t=tagFor(l);
  const parts=[l.co,l.sw,l.dd?(l.dd===td()?'Today':fmt(l.dd)):null].filter(Boolean);
  const sub=parts.join(' · ');
  const typeLabel=l.dtype?` · ${l.dtype.charAt(0).toUpperCase()+l.dtype.slice(1)}`:'';
  return `<div class="lead-row" onclick="openDetail(${l.id})">
    <div class="dot ${t.cls}"></div>
    <div class="lead-info">
      <div class="lead-name">${l.name}</div>
      <div class="lead-sub">${sub}</div>
    </div>
    <div class="lead-right">
      <div class="lead-tag ${t.cls}">${t.txt}${l.st==='demo'?typeLabel:''}</div>
      <div class="lead-date">${l.ph.slice(-4)}</div>
    </div>
  </div>`;
}

// ── RENDER ──
function render() {
  const t=td();
  document.getElementById('s-demos').textContent = leads.filter(l=>l.dd===t&&l.st==='demo').length;
  document.getElementById('s-calls').textContent = leads.filter(l=>l.st==='call').length;

  // maint alerts
  const due=leads.filter(l=>l.pay==='cash'&&l.cd).map(l=>({l,d:dl(l)})).filter(x=>x.d!=null&&x.d>=0&&x.d<=30);
  document.getElementById('maint-alerts').innerHTML=due.map(({l,d})=>
    `<div class="maint-alert"><div class="maint-alert-icon">⚠️</div><div class="maint-alert-text"><strong>${l.name}</strong><span>${l.co} · Maintenance ${d===0?'today':'in '+d+' days'}</span></div></div>`).join('');

  // today demos
  const demos=leads.filter(l=>l.dd===t&&l.st==='demo');
  document.getElementById('today-list').innerHTML=demos.length?demos.map(rowHTML).join(''):`<div class="empty">No demos scheduled today</div>`;

  // date chips
  const dates=[...new Set(leads.map(l=>l.dd).filter(Boolean))].sort().reverse();
  document.getElementById('date-chips').innerHTML=
    `<button class="chip ${dtFilter==='all'?'active':''}" onclick="setDt('all')">All</button>`+
    dates.map(d=>`<button class="chip ${dtFilter===d?'active':''}" onclick="setDt('${d}')">${d===t?'Today':fmt(d)}</button>`).join('');

  // leads list
  let f=leads;
  if(dtFilter!=='all') f=f.filter(l=>l.dd===dtFilter);
  if(stFilter!=='all') f=f.filter(l=>l.st===stFilter);
  document.getElementById('leads-list').innerHTML=f.length?f.map(rowHTML).join(''):`<div class="empty">No leads found</div>`;

  // maint list
  const cash=leads.filter(l=>l.pay==='cash'&&l.cd).sort((a,b)=>(dl(a)||9999)-(dl(b)||9999));
  document.getElementById('maint-list').innerHTML=cash.length?cash.map(l=>{
    const d=dl(l),m=mDate(l),ov=d!=null&&d<0;
    return `<div class="lead-row" onclick="openDetail(${l.id})">
      <div class="dot ${ov?'maint':'cash'}"></div>
      <div class="lead-info">
        <div class="lead-name">${l.name}</div>
        <div class="lead-sub">${l.co} · Due ${fmtY(m?.toISOString().split('T')[0])}</div>
      </div>
      <div class="lead-right">
        <div class="lead-tag ${ov?'maint':'cash'}">${d==null?'—':ov?'Overdue':d===0?'Today':d+'d left'}</div>
        <div class="lead-date">₹${Number(l.amt).toLocaleString('en-IN')}</div>
      </div>
    </div>`;
  }).join(''):`<div class="empty">No cash clients yet</div>`;
}

function setDt(d){dtFilter=d;render();}
function setSt(s,btn){stFilter=s;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

// ── DETAIL ──
function openDetail(id) {
  const l=leads.find(x=>x.id===id); if(!l) return;
  deleteId=id;
  document.getElementById('d-name').textContent=l.name;
  document.getElementById('d-co').textContent=l.co||'—';
  document.getElementById('d-confirm').style.display='none';
  const t=tagFor(l),d=dl(l),m=mDate(l);
  document.getElementById('d-rows').innerHTML=`
    <div class="detail-row"><span>Phone</span><span><a href="tel:${l.ph}" style="color:var(--accent);font-weight:500;">${l.ph}</a></span></div>
    <div class="detail-row"><span>Status</span><span class="lead-tag ${t.cls}">${t.txt}</span></div>
    ${l.sw?`<div class="detail-row"><span>Software</span><span>${l.sw}</span></div>`:''}
    ${l.ref?`<div class="detail-row"><span>Reference</span><span>${l.ref}</span></div>`:''}
    ${l.dd?`<div class="detail-row"><span>Demo Date</span><span>${fmtY(l.dd)}${l.dtype?' · '+l.dtype.charAt(0).toUpperCase()+l.dtype.slice(1):''}</span></div>`:''}
    ${l.amt?`<div class="detail-row"><span>Amount</span><span>₹${Number(l.amt).toLocaleString('en-IN')}</span></div>`:''}
    ${l.cd?`<div class="detail-row"><span>Closed On</span><span>${fmtY(l.cd)}</span></div>`:''}
    ${m?`<div class="detail-row"><span>Maintenance</span><span style="color:${d!=null&&d<=30?'var(--red)':'inherit'}">${fmtY(m.toISOString().split('T')[0])}${d!=null?' ('+d+'d)':''}</span></div>`:''}
    ${l.notes?`<div class="detail-row"><span>Notes</span><span>${l.notes}</span></div>`:''}
    ${l.rejectReason?`<div class="detail-row"><span>Rejected — Reason</span><span style="color:var(--red)">${l.rejectReason}</span></div>`:''}
    ${l.rejectNotes?`<div class="detail-row"><span>Reject Notes</span><span>${l.rejectNotes}</span></div>`:''}
  `;
  document.getElementById('d-action-btns').innerHTML=`
    <a href="tel:${l.ph}" class="btn-ghost" style="margin-bottom:10px;display:block;text-align:center;text-decoration:none;">📞 Call</a>
    ${l.st!=='closed'&&l.st!=='rejected'?`<button class="btn-primary" onclick="closeDetail();openUpd(${l.id})">Update Status</button>`:''}
    ${l.pay==='cash'&&d!=null&&d<=30?`<button class="btn-ghost" style="margin-bottom:10px;border-color:#1E7A5F;color:#1E7A5F;" onclick="markDone(${l.id})">✅ Maintenance Done</button>`:''}
  `;
  const rejectBtn = document.getElementById('d-reject-btn');
  if(rejectBtn) rejectBtn.innerHTML = l.st!=='rejected' ? '<button class="btn-danger" onclick="document.getElementById(\'d-confirm\').style.display=\'block\';document.getElementById(\'reject-notes\').value=\'\'" style="width:100%;margin-top:10px;">✕ Mark as Rejected</button>' : '';
  document.getElementById('detOv').classList.add('open');
}
function closeDetail(){document.getElementById('detOv').classList.remove('open');}

function confirmReject() {
  if(!deleteId) return;
  const i=leads.findIndex(x=>x.id===deleteId); if(i<0) return;
  leads[i].st='rejected';
  leads[i].rejectReason=document.getElementById('reject-reason').value;
  leads[i].rejectNotes=document.getElementById('reject-notes').value.trim();
  save(); closeDetail(); render(); showToast('Marked as rejected');
}

// ── ADD ──
function openAdd() {
  ['f-name','f-co','f-ph','f-sw','f-ref','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-st').value='call';
  document.getElementById('f-dd').value=td();
  document.getElementById('f-cd').value=td();
  document.getElementById('f-amt').value='';
  document.getElementById('f-pay').value='cheque';
  document.getElementById('f-dtype').value='offline';
  handleAdd();
  document.getElementById('addOv').classList.add('open');
}
function closeAdd(){document.getElementById('addOv').classList.remove('open');}
function handleAdd(){
  const st=document.getElementById('f-st').value;
  document.getElementById('f-demo-wrap').style.display=st==='demo'?'block':'none';
  document.getElementById('f-pay-wrap').style.display=st==='closed'?'block':'none';
}
function saveLead(){
  const name=document.getElementById('f-name').value.trim(),ph=document.getElementById('f-ph').value.trim();
  if(!name||!ph){showToast('Name & phone required');return;}
  const st=document.getElementById('f-st').value;
  leads.unshift({
    id:Date.now(),name,co:document.getElementById('f-co').value.trim(),ph,
    sw:document.getElementById('f-sw').value.trim(),
    ref:document.getElementById('f-ref').value.trim(),
    st,
    dd:st==='demo'?document.getElementById('f-dd').value:null,
    dtype:st==='demo'?document.getElementById('f-dtype').value:null,
    pay:st==='closed'?document.getElementById('f-pay').value:null,
    amt:st==='closed'?document.getElementById('f-amt').value:null,
    cd:st==='closed'?document.getElementById('f-cd').value:null,
    notes:document.getElementById('f-notes').value.trim()
  });
  save();closeAdd();render();showToast('Lead saved');
}

// ── UPDATE ──
function openUpd(id){
  const l=leads.find(x=>x.id===id); if(!l) return;
  document.getElementById('u-id').value=id;
  document.getElementById('u-title').textContent=l.name;
  document.getElementById('u-st').value=l.st;
  document.getElementById('u-dd').value=l.dd||td();
  document.getElementById('u-dtype').value=l.dtype||'offline';
  document.getElementById('u-pay').value=l.pay||'cheque';
  document.getElementById('u-amt').value=l.amt||'';
  document.getElementById('u-cd').value=l.cd||td();
  handleUpd();
  document.getElementById('updOv').classList.add('open');
}
function closeUpd(){document.getElementById('updOv').classList.remove('open');}
function handleUpd(){
  const s=document.getElementById('u-st').value;
  document.getElementById('u-dd-wrap').style.display=s==='demo'?'block':'none';
  document.getElementById('u-pay-wrap').style.display=s==='closed'?'block':'none';
}
function saveUpd(){
  const id=Number(document.getElementById('u-id').value),i=leads.findIndex(x=>x.id===id);if(i<0)return;
  const st=document.getElementById('u-st').value;
  leads[i].st=st;
  if(st==='demo'){leads[i].dd=document.getElementById('u-dd').value;leads[i].dtype=document.getElementById('u-dtype').value;}
  if(st==='closed'){leads[i].pay=document.getElementById('u-pay').value;leads[i].amt=document.getElementById('u-amt').value;leads[i].cd=document.getElementById('u-cd').value;}
  save();closeUpd();render();showToast('Updated');
}

function markDone(id){
  const l=leads.find(x=>x.id===id);if(!l)return;
  l.cd=td();save();closeDetail();render();showToast('Maintenance reset ✓');
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}

['addOv','detOv','updOv'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

render();
</script>
</body>
</html>
